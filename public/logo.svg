<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <!-- Wax seal circle -->
  <circle cx="28" cy="28" r="24" fill="url(#sealGrad)" />
  <circle cx="28" cy="28" r="20" fill="none" stroke="rgba(255,220,150,0.35)" stroke-width="1" />
  <!-- Amphora / urn shape -->
  <g transform="translate(28,28)">
    <!-- Neck -->
    <rect x="-4" y="-14" width="8" height="5" rx="1" fill="rgba(255,240,200,0.9)" />
    <!-- Handles -->
    <path d="M-6,-11 Q-13,-7 -12,0 Q-11,5 -7,6" stroke="rgba(255,240,200,0.85)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M6,-11 Q13,-7 12,0 Q11,5 7,6" stroke="rgba(255,240,200,0.85)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M-7,-9 Q-12,0 -10,8 Q-8,14 0,14 Q8,14 10,8 Q12,0 7,-9 Z" fill="rgba(255,240,200,0.9)" />
    <!-- Rim line -->
    <line x1="-5" y1="14" x2="5" y2="14" stroke="rgba(180,130,50,0.7)" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- LegacyVault text -->
  <text x="62" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" font-style="italic" fill="#2c1e17" letter-spacing="-0.3">LegacyVault</text>
  <!-- Subtitle tagline -->
  <text x="63" y="38" font-family="'Courier New', Courier, monospace" font-size="8.5" fill="#9a7a52" letter-spacing="2.5" text-anchor="start">CAPSULES · MÉMOIRE · TEMPS</text>
  <!-- Ink rule under name -->
  <line x1="62" y1="26" x2="210" y2="26" stroke="url(#ruleGrad)" stroke-width="0.8" opacity="0.5"/>
  <defs>
    <radialGradient id="sealGrad" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#7b1a1a"/>
    </radialGradient>
    <linearGradient id="ruleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cdb99a" stop-opacity="0"/>
      <stop offset="40%" stop-color="#b8861f" stop-opacity="1"/>
      <stop offset="100%" stop-color="#cdb99a" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
